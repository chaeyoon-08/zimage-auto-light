<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zimage-auto-light</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,12 88,34 50,56 12,34' fill='%23B47AFF'/></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --purple:#B47AFF; --purple-deep:#9D4EFF; --purple-label:#7F4FD9;
    --text:#FFFFFF; --text-2:#E0D8F0; --text-muted:#A0A0B0; --text-dim:#8A8A98;
    --line:rgba(180,122,255,0.22); --card:rgba(255,255,255,0.04);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{min-height:100%;}
  body{
    font-family:'Pretendard',sans-serif;
    background:linear-gradient(135deg,#0A0A14 0%,#1A1230 55%,#0A0A14 100%);
    background-attachment:fixed;
    color:var(--text-2);
    min-height:100vh;
    height:100vh;
    display:flex;
    position:relative;
    overflow:hidden;
  }
  /* 모서리 번지는 글로우 (발표자료 배경과 동일) */
  body::before{content:'';position:fixed;top:-140px;right:-120px;width:560px;height:560px;
    background:radial-gradient(circle,rgba(157,78,255,0.25) 0%,rgba(157,78,255,0) 70%);pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;bottom:-160px;left:-120px;width:460px;height:460px;
    background:radial-gradient(circle,rgba(180,122,255,0.15) 0%,rgba(180,122,255,0) 70%);pointer-events:none;z-index:0;}

  /* 별자리/회로 배경 레이어 */
  .bg-net{position:fixed;inset:0;width:100%;height:100%;z-index:0;opacity:0.32;pointer-events:none;}

  .eng{font-family:'Orbitron',sans-serif;}
  .wrap{position:relative;z-index:2;max-width:1180px;width:100%;margin:0 auto;padding:22px 28px;display:flex;flex-direction:column;height:100%;}

  header{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px;flex:none;}
  header .cube{height:40px;width:auto;flex:none;image-rendering:auto;}
  header h1{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:#fff;letter-spacing:.5px;}
  header h1 .lt{color:var(--purple);}
  header .badge{font-size:11px;background:rgba(127,79,217,.25);color:#cbb0ff;border:1px solid var(--line);
    padding:3px 9px;border-radius:6px;margin-left:6px;font-family:'Orbitron',sans-serif;}
  header .badge .dtype{margin-left:7px;padding:1px 6px;border-radius:4px;background:rgba(180,122,255,.35);color:#fff;}

  .grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:minmax(0,1fr);gap:22px;flex:1;min-height:0;}
  /* 왼쪽 절반: Manual(위, 잡 통합) + Resources(아래 단독) */
  .col-left{display:flex;flex-direction:column;gap:18px;min-height:0;overflow-y:auto;}
  .col-left > .panel{flex:none;}
  .col-left .panel + .panel{margin-top:0;}
  .job-divider{height:1px;background:var(--line);margin:14px 0 12px;}
  /* 오른쪽 절반: 갤러리 세로 꽉 + 내부 스크롤 */
  .gallery-panel{display:flex;flex-direction:column;min-height:0;}
  .gallery-panel .gallery{flex:1;overflow-y:auto;min-height:0;align-content:start;}
  @media(max-width:820px){body{height:auto;overflow:auto;}.wrap{height:auto;}.grid{grid-template-columns:1fr;grid-template-rows:none;}.col-left{overflow:visible;}.gallery-panel{min-height:auto;}.gallery-panel .gallery{overflow:visible;}}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;
    backdrop-filter:blur(6px);box-shadow:0 10px 40px rgba(0,0,0,.25);}
  .panel + .panel{margin-top:18px;}
  .panel h2{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--purple-label);
    font-family:'Orbitron',sans-serif;margin-bottom:14px;}

  label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
  textarea,input{width:100%;background:rgba(10,10,20,.6);border:1px solid var(--line);border-radius:8px;
    color:#fff;font-size:14px;padding:9px 11px;font-family:inherit;}
  textarea{min-height:70px;resize:vertical;margin-bottom:12px;}
  textarea:focus,input:focus{outline:none;border-color:var(--purple);}
  .params{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .params.params-3{grid-template-columns:1fr 1fr 1fr;}
  .field{margin-bottom:0;}
  .count-hint{font-size:11px;color:var(--text-dim);margin:-4px 0 12px;}

  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-weight:600;transition:.15s;}
  .btn-main{width:100%;padding:11px;background:var(--purple);color:#fff;font-size:15px;}
  .btn-main:hover{background:var(--purple-deep);}
  .btn-main:disabled{background:#2a2440;color:#777;cursor:not-allowed;}
  .ctrl{display:flex;gap:8px;margin-top:12px;}
  .ctrl button{flex:1;padding:9px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text-2);display:flex;align-items:center;justify-content:center;}
  .ctrl button svg{width:17px;height:17px;}
  .ctrl button:hover{border-color:var(--purple);color:#fff;}
  .ctrl button.danger:hover{border-color:#ff6b6b;color:#ff9b9b;}
  .ctrl button:disabled{opacity:.35;cursor:not-allowed;}

  .status-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;}
  .state-chip{font-family:'Orbitron',sans-serif;font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid var(--line);}
  .s-running{color:#8cffb0;border-color:rgba(140,255,176,.4);}
  .s-paused{color:#ffd580;border-color:rgba(255,213,128,.4);}
  .s-cancelled,.s-error{color:#ff9b9b;border-color:rgba(255,107,107,.4);}
  .s-idle,.s-done{color:var(--text-muted);}
  .bar{height:8px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--purple-deep),var(--purple));transition:width .3s;}
  .lock-note{font-size:12px;color:var(--text-dim);margin-top:9px;}

  /* 리소스 패널 */
  .res-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .res{background:rgba(10,10,20,.45);border:1px solid var(--line);border-radius:9px;padding:10px 12px;}
  .res .rk{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);}
  .res .rv{font-size:16px;color:#fff;font-family:'Orbitron',sans-serif;margin-top:3px;}
  .res .rv small{font-size:11px;color:var(--text-dim);font-family:'Pretendard';}
  .res-bar{height:5px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-top:7px;}
  .res-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--purple-deep),var(--purple));}

  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:14px;}
  .thumb{background:rgba(10,10,20,.5);border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer;transition:.15s;}
  .thumb:hover{border-color:var(--purple);transform:translateY(-2px);}
  .thumb img{width:100%;display:block;aspect-ratio:1;object-fit:cover;background:#111;}
  .thumb .cap{padding:7px 9px;font-size:11px;color:var(--text-muted);}
  .thumb .cap .src{color:var(--purple);font-family:'Orbitron',sans-serif;font-size:9px;}
  .empty{color:var(--text-dim);font-size:13px;padding:40px 0;text-align:center;}

  .modal{position:fixed;inset:0;background:rgba(5,5,12,.85);display:none;align-items:center;justify-content:center;padding:24px;z-index:50;}
  .modal.on{display:flex;}
  .modal-box{background:#120e22;border:1px solid var(--line);border-radius:16px;max-width:900px;width:100%;
    max-height:90vh;overflow:auto;display:grid;grid-template-columns:1fr 280px;}
  @media(max-width:700px){.modal-box{grid-template-columns:1fr;}}
  .modal-box img{width:100%;display:block;border-radius:16px 0 0 16px;background:#000;}
  .detail{padding:22px;}
  .detail h3{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--purple);margin-bottom:14px;}
  .detail .kv{margin-bottom:11px;}
  .detail .k{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:2px;}
  .detail .v{font-size:13px;color:#fff;word-break:break-word;}
  .detail .close{margin-top:16px;width:100%;padding:9px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--text-2);}
  .err{color:#ff9b9b;font-size:12px;margin-top:10px;display:none;}
</style>
</head>

    <h1 class="eng"><span class="lt">zimage</span>-auto-light <span class="badge" id="modelBadge">loading…</span></h1>
  </header>

  <div class="grid">
    <div class="col-left">
      <div class="panel">
        <h2>Manual Generate</h2>
        <label>Prompt</label>
        <textarea id="prompt" placeholder="만들고 싶은 이미지를 설명하세요..."></textarea>
        <div class="params">
          <div class="field"><label>Width</label><input id="width" type="number" value="1024" step="64" min="256" max="2048"></div>
          <div class="field"><label>Height</label><input id="height" type="number" value="1024" step="64" min="256" max="2048"></div>
        </div>
        <div class="params params-3">
          <div class="field"><label>Steps</label><input id="steps" type="number" value="8" min="1" max="50"></div>
          <div class="field"><label>Seed</label><input id="seed" type="number" placeholder="random"></div>
          <div class="field"><label>개수</label><input id="count" type="number" value="1" min="1" max="1000"></div>
        </div>
        <div class="count-hint">개수 &gt; 1 이면 배치 작업으로 실행됩니다 (진행·일시중지·취소 적용).</div>
        <button class="btn-main" id="genBtn" onclick="generate()">생성</button>
        <div class="lock-note" id="lockNote"></div>
        <div class="err" id="genErr"></div>

        <!-- 잡 진행/제어 (생성과 같은 상자 안) -->
        <div class="job-divider"></div>
        <div class="status-row">
          <span id="jobCounts">대기 중</span>
          <span class="state-chip s-idle" id="stateChip">IDLE</span>
        </div>
        <div class="bar"><i id="barFill"></i></div>
        <div id="jobMsg" class="lock-note"></div>
        <div class="ctrl">
          <button id="pauseBtn" title="일시중지" onclick="jobAction('pause')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
          </button>
          <button id="resumeBtn" title="재개" onclick="jobAction('resume')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><polygon points="7,4 20,12 7,20"/></svg>
          </button>
          <button id="cancelBtn" class="danger" title="취소" onclick="jobAction('cancel')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div class="panel res-panel">
        <h2>Resources</h2>
        <div class="res-grid">
          <div class="res"><div class="rk">GPU VRAM</div><div class="rv" id="rVram">-</div><div class="res-bar"><i id="rVramBar"></i></div></div>
          <div class="res"><div class="rk">System RAM</div><div class="rv" id="rRam">-</div><div class="res-bar"><i id="rRamBar"></i></div></div>
          <div class="res"><div class="rk">GPU Util</div><div class="rv" id="rUtil">-</div></div>
          <div class="res"><div class="rk">Last gen</div><div class="rv" id="rTime">-</div></div>
        </div>
        <div class="lock-note" id="rPeak"></div>
      </div>
    </div>

    <div class="panel gallery-panel">
      <h2>Generated Images (<span id="imgCount">0</span>)</h2>
      <div class="gallery" id="gallery"></div>
      <div class="empty" id="galleryEmpty">아직 생성된 이미지가 없습니다.</div>
    </div>
  </div>
</div>

<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <img id="mImg" src="" alt="">
    <div class="detail">
      <h3 class="eng">IMAGE DETAIL</h3>
      <div class="kv"><div class="k">Prompt</div><div class="v" id="mPrompt"></div></div>
      <div class="kv"><div class="k">Seed</div><div class="v" id="mSeed"></div></div>
      <div class="kv"><div class="k">Size</div><div class="v" id="mSize"></div></div>
      <div class="kv"><div class="k">Steps</div><div class="v" id="mSteps"></div></div>
      <div class="kv"><div class="k">Source</div><div class="v" id="mSource"></div></div>
      <div class="kv"><div class="k">Created</div><div class="v" id="mCreated"></div></div>
      <button class="close" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<script>
let metaCache = {};

async function generate(){
  const errEl=document.getElementById('genErr'); errEl.style.display='none';
  const count=+document.getElementById('count').value||1;
  const body={
    prompt:document.getElementById('prompt').value,
    width:+document.getElementById('width').value,
    height:+document.getElementById('height').value,
    num_inference_steps:+document.getElementById('steps').value,
    count:count,
  };
  const seed=document.getElementById('seed').value;
  if(seed!=='') body.seed=+seed;
  const btn=document.getElementById('genBtn'); btn.disabled=true; btn.textContent='생성 중...';
  try{
    const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){const e=await r.json();throw new Error(e.detail||'생성 실패');}
    await Promise.all([refreshImages(),refreshStatus()]);
  }catch(e){ errEl.textContent=e.message; errEl.style.display='block'; }
  finally{ btn.textContent='생성'; refreshStatus(); }
}

async function jobAction(action){
  await fetch('/api/job/'+action,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  await refreshStatus();
}

async function refreshStatus(){
  try{
    const s=await(await fetch('/api/status')).json();
    const chip=document.getElementById('stateChip');
    chip.textContent=s.state.toUpperCase(); chip.className='state-chip s-'+s.state;
    document.getElementById('jobCounts').textContent=s.total?`${s.completed} / ${s.total}`:'대기 중';
    document.getElementById('barFill').style.width=s.total?(100*s.completed/s.total)+'%':'0%';
    document.getElementById('jobMsg').textContent=s.message||'';
    const locked=s.busy;
    document.getElementById('genBtn').disabled=locked;
    document.getElementById('lockNote').textContent=locked?'⏳ 작업 중 — 수동 생성 잠금':'';
    document.getElementById('pauseBtn').disabled=s.state!=='running';
    document.getElementById('resumeBtn').disabled=s.state!=='paused';
    document.getElementById('cancelBtn').disabled=!s.busy;
  }catch(e){}
}

async function refreshResources(){
  try{
    const r=await(await fetch('/api/resources')).json();
    if(r.gpu){
      const g=r.gpu, pct=g.vram_total_mb?100*g.vram_used_mb/g.vram_total_mb:0;
      document.getElementById('rVram').innerHTML=`${(g.vram_used_mb/1024).toFixed(1)}<small> / ${(g.vram_total_mb/1024).toFixed(0)} GB</small>`;
      document.getElementById('rVramBar').style.width=pct+'%';
      document.getElementById('rUtil').textContent=g.util_percent!=null?g.util_percent+' %':'N/A';
    }
    if(r.ram){
      document.getElementById('rRam').innerHTML=`${(r.ram.used_mb/1024).toFixed(1)}<small> / ${(r.ram.total_mb/1024).toFixed(0)} GB</small>`;
      document.getElementById('rRamBar').style.width=r.ram.percent+'%';
    }
    if(r.last_gen&&r.last_gen.seconds!=null){
      document.getElementById('rTime').innerHTML=`${r.last_gen.seconds}<small> s</small>`;
      if(r.last_gen.peak_vram_mb!=null)
        document.getElementById('rPeak').textContent=`최근 생성 VRAM peak: ${(r.last_gen.peak_vram_mb/1024).toFixed(2)} GB (torch) · 디바이스 사용: ${(r.last_gen.device_used_mb/1024).toFixed(2)} GB`;
    }
  }catch(e){}
}

async function refreshImages(){
  try{
    const list=await(await fetch('/api/images')).json();
    document.getElementById('imgCount').textContent=list.length;
    document.getElementById('galleryEmpty').style.display=list.length?'none':'block';
    const g=document.getElementById('gallery');
    g.innerHTML=list.map(m=>{metaCache[m.id]=m;
      return `<div class="thumb" onclick="openModal(${m.id})">
        <img src="/api/images/${m.id}/file" loading="lazy">
        <div class="cap"><span class="src">${m.source.toUpperCase()}</span> · seed ${m.seed}</div></div>`;
    }).join('');
  }catch(e){}
}

function openModal(id){
  const m=metaCache[id]; if(!m)return;
  document.getElementById('mImg').src='/api/images/'+id+'/file';
  document.getElementById('mPrompt').textContent=m.prompt||'(없음)';
  document.getElementById('mSeed').textContent=m.seed;
  document.getElementById('mSize').textContent=m.width+' × '+m.height;
  document.getElementById('mSteps').textContent=m.steps;
  document.getElementById('mSource').textContent=m.source;
  document.getElementById('mCreated').textContent=m.created;
  document.getElementById('modal').classList.add('on');
}
function closeModal(){ document.getElementById('modal').classList.remove('on'); }

async function loadModel(){
  try{
    const m=await(await fetch('/api/model')).json();
    document.getElementById('modelBadge').textContent=m.dtype;
  }catch(e){ document.getElementById('modelBadge').textContent='model'; }
}

// 폴링 (게이트웨이 부담 줄이려 간격 늘림)
loadModel(); refreshStatus(); refreshImages(); refreshResources();
setInterval(refreshStatus,2000);
setInterval(refreshImages,3500);
setInterval(refreshResources,2500);
</script>
</body>
</html>
