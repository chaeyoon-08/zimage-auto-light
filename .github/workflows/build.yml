name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dtype: uint4
            model_repo: Disty0/Z-Image-Turbo-SDNQ-uint4-svd-r32
          - dtype: int8
            model_repo: Disty0/Z-Image-Turbo-SDNQ-int8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 모델(~6.5~10.8GB) + torch + 베이스를 합치면 기본 러너 디스크 초과 → 정리
      # (지우는 건 우리 빌드와 무관한 사전설치 SDK·툴체인)
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.dtype }})
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            MODEL_REPO=${{ matrix.model_repo }}
          tags: ghcr.io/${{ steps.owner.outputs.owner }}/zimage-auto-light-${{ matrix.dtype }}:latest
          cache-from: type=gha,scope=${{ matrix.dtype }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dtype }}
